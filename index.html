<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Dashboard</title>
<style>
body{margin:0;background:#111;color:white;font-family:Arial,sans-serif;overflow:hidden;}
#header{height:70px;background:#1b1b1b;display:flex;justify-content:space-between;align-items:center;padding:0 20px;box-sizing:border-box;border-bottom:1px solid #333;}
#clock{font-size:32px;font-weight:bold;}
#date{font-size:18px;color:#bbb;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr 1fr;
gap:10px;
padding:10px;
height:calc(100vh - 90px);
box-sizing:border-box;
}
.tile{background:#222;border-radius:20px;padding:20px;box-sizing:border-box;cursor:pointer;}
.tile-title{font-size:26px;font-weight:bold;margin-bottom:15px;}
.tile-content{font-size:20px;line-height:1.6;color:#ddd;}

#weatherTile{font-size:30px;line-height:1.3;}
#fullscreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#111;display:none;z-index:999;}
#backBtn{margin:15px;padding:10px 20px;font-size:18px;border:none;border-radius:10px;}
#fullContent{padding:20px;font-size:28px;}
</style>
</head>
<body>
<div id="header"><div id="date"></div><div id="clock"></div></div>

<div class="grid">
<div class="tile" onclick="openTile('weather')">
<div class="tile-title">🌦 Weather</div>
<div class="tile-content" id="weatherTile">Loading...</div>
</div>

<div class="tile" onclick="openTile('traffic')">
<div class="tile-title">🚗 Traffic to OGGB</div>
<div class="tile-content" id="trafficTile">
Loading...
</div>
</div>

<div class="tile" onclick="openTile('calendar')">
    <div class="tile-title">📅 Events</div>
    <div class="tile-content" id="eventsTile">
        Loading...
    </div>
</div>

<div class="tile" onclick="openTile('todo')">
<div class="tile-title">✅ To Do</div>
<div class="tile-content" id="todoTile">Loading...</div>
</div>
</div>


<div class="tile">
<div class="tile-title">🌱 Garden</div>
<div class="tile-content" id="gardenTile">
Loading...
</div>
</div>

<div class="tile">
<div class="tile-title">⭐ Future</div>
<div class="tile-content">
Coming Soon
</div>
</div>

<div id="fullscreen">
<button id="backBtn" onclick="closeTile()">⬅ Back</button>
<div id="fullContent"></div>
</div>

<script>
function updateClock(){
 const now=new Date();
 document.getElementById("clock").innerHTML=now.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});
 document.getElementById("date").innerHTML=now.toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'long'});
}
setInterval(updateClock,1000); updateClock();

function openTile(type){
 let html="";
 switch(type){
 case "weather":
 html=`<h1>🌦 Auckland Forecast</h1><div id="weatherFullScreen">Loading forecast...</div>`;
 break;
 case "traffic":
 window.open("https://www.google.com/maps/dir/Half+Moon+Bay+Auckland/OGGB+Auckland","_blank");
 return;
 
case "calendar":
window.open(
"https://calendar.google.com/calendar/u/0/embed?src=family01253806463679416003%40group.calendar.google.com",
"_blank"
);
return;
 case "todo":
 html=`<h1>Family To Do</h1><div id="todoFullScreen">Loading...</div>`;
 break;
 }
 document.getElementById("fullContent").innerHTML=html;
 document.getElementById("fullscreen").style.display="block";
 if(type==="todo") loadTodoFullscreen();
 if(type==="weather") loadWeatherFullscreen();
}
function closeTile(){document.getElementById("fullscreen").style.display="none";}

async function loadTodo(){
 const csvUrl="https://docs.google.com/spreadsheets/d/e/2PACX-1vQX28gXFAl_D2C326JF5X_tdLcdj6mQkv515uQID4WU01lyAZBMne2oMjpShwliQ7JAEyMkDZhBUlli/pub?gid=0&single=true&output=csv";
 try{
   const response=await fetch(csvUrl);
   const text=await response.text();
   const rows=text.trim().split('\n');
   let html="";
   for(let i=1;i<rows.length;i++){
     const cols=rows[i].split(',');
     const done=(cols[0]||"").replace(/"/g,"").trim();
     const task=(cols[1]||"").replace(/"/g,"").trim();
     if(task!=="" && done==="") html+="• "+task+"<br>";
   }
   if(html==="") html="🎉 No tasks remaining";
   document.getElementById("todoTile").innerHTML=html;
 }catch(err){
   document.getElementById("todoTile").innerHTML="Unable to load tasks";
 }
}

async function loadTraffic(){

  try{

    const response = await fetch(
      "https://family-traffic.weijie6.workers.dev/"
    );

    const data = await response.json();

    let icon = "🟢";

      if(data.status==="warning") icon="🟠";
      if(data.status==="alert") icon="🔴";

    const statusText =
 	 data.status.charAt(0).toUpperCase() +
	 data.status.slice(1);

	document.getElementById("trafficTile").innerHTML =
         `${icon} ${statusText}<br>${data.message}`;


  }catch(err){

    document.getElementById("trafficTile").innerHTML =
      "Traffic unavailable";

  }
}

async function loadTodoFullscreen(){
 const csvUrl="https://docs.google.com/spreadsheets/d/e/2PACX-1vQX28gXFAl_D2C326JF5X_tdLcdj6mQkv515uQID4WU01lyAZBMne2oMjpShwliQ7JAEyMkDZhBUlli/pub?gid=0&single=true&output=csv";
 try{
   const response=await fetch(csvUrl);
   const text=await response.text();
   const rows=text.trim().split('\n');
   let html="";
   for(let i=1;i<rows.length;i++){
     const cols=rows[i].split(',');
     const done=(cols[0]||"").replace(/"/g,"").trim();
     const task=(cols[1]||"").replace(/"/g,"").trim();
     if(task!=="" && done==="") html+="• "+task+"<br><br>";
   }
   if(html==="") html="🎉 No tasks remaining";
   document.getElementById("todoFullScreen").innerHTML=html;
 }catch(err){
   document.getElementById("todoFullScreen").innerHTML="Unable to load tasks";
 }
}

async function loadWeather(){
 try{
   const url="https://api.open-meteo.com/v1/forecast?latitude=-36.8485&longitude=174.7633&current=temperature_2m,apparent_temperature,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Pacific%2FAuckland";
   const response=await fetch(url);
   const data=await response.json();
   const temp=Math.round(data.current.temperature_2m);
   const feels=Math.round(data.current.apparent_temperature);
   const max=Math.round(data.daily.temperature_2m_max[0]);
   const min=Math.round(data.daily.temperature_2m_min[0]);
   const code=data.current.weather_code;
   let condition="☀️ Clear";
   if(code>=1) condition="☁️ Cloudy";
   if(code>=51) condition="🌧 Rain";
   if(code>=71) condition="❄️ Snow";
   if(code>=95) condition="⛈ Thunderstorm";
   document.getElementById("weatherTile").innerHTML=`Auckland<br>${temp}°C<br>Feels ${feels}°C<br>${condition}<br>H ${max}° L ${min}°`;
 }catch(err){
   document.getElementById("weatherTile").innerHTML="Auckland<br>Weather unavailable";
 }
}

async function loadWeatherFullscreen(){
 try{
   const url="https://api.open-meteo.com/v1/forecast?latitude=-36.8485&longitude=174.7633&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Pacific%2FAuckland";
   const response=await fetch(url);
   const data=await response.json();
   const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
   let html="";
   for(let i=0;i<7;i++){
      const d=new Date(data.daily.time[i]);
      let icon="☀️";
      const code=data.daily.weather_code[i];
      if(code>=1) icon="☁️";
      if(code>=51) icon="🌧";
      if(code>=71) icon="❄️";
      if(code>=95) icon="⛈";
      html += `${days[d.getDay()]} ${icon} ${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°<br><br>`;
   }
   document.getElementById("weatherFullScreen").innerHTML=html;
 }catch(err){
   document.getElementById("weatherFullScreen").innerHTML="Unable to load forecast";
 }
}

async function loadEvents(){
 try{
   const response = await fetch("https://family-events.weijie6.workers.dev/");
   const data = await response.json();

   let html = "";

   if(data.today && data.today.length){
      html += "<b>Today</b><br>";
      data.today.forEach(e => html += "• " + e + "<br>");
      html += "<br>";
   }

   if(data.tomorrow && data.tomorrow.length){
      html += "<b>Tomorrow</b><br>";
      data.tomorrow.forEach(e => html += "• " + e + "<br>");
      html += "<br>";
   }

   if(data.next && data.next.length){
      html += "<b>Next</b><br>";
      data.next.forEach(e => html += "• " + e + "<br>");
   }

   document.getElementById("eventsTile").innerHTML = html;

 }catch(err){
   document.getElementById("eventsTile").innerHTML = "Unable to load events";
 }
}


async function loadGarden(){

  const csvUrl =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO7JVf0fgcBotEA2ZrezNwlWX6VT2Zd2ep-wx-sQNpG47KNIgtS6pXMtxw5gdoUQdCahZ0efGOEp8s/pub?output=csv";

  try{

    const response = await fetch(csvUrl);
    const text = await response.text();

    const rows = text.trim().split('\n');

    const monthNames = [
      "January","February","March","April",
      "May","June","July","August",
      "September","October","November","December"
    ];

    const currentMonth =
      monthNames[new Date().getMonth()];

    let html = "";

    for(let i=1;i<rows.length;i++){

      const cols = rows[i].split(',');

      const month = (cols[0]||"").replace(/"/g,"").trim();
      const task = (cols[2]||"").replace(/"/g,"").trim();

      if(month === currentMonth && task !== ""){
        html += "• " + task + "<br>";
      }
    }

    if(html===""){
      html = "No garden tasks this month";
    }

    document.getElementById("gardenTile").innerHTML = html;

  }catch(err){

    document.getElementById("gardenTile").innerHTML =
      "Unable to load garden tasks";

  }
}



loadWeather();
setInterval(loadWeather,1800000);

loadTodo();
setInterval(loadTodo,300000);

loadEvents();
setInterval(loadEvents,300000);

loadTraffic();
setInterval(loadTraffic,300000);

loadGarden();
setInterval(loadGarden,3600000);


</script>
</body>
</html>
