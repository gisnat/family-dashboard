<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Family Dashboard</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

#header{
    height:70px;
    background:#1b1b1b;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    box-sizing:border-box;
    border-bottom:1px solid #333;
}

#clock{
    font-size:32px;
    font-weight:bold;
}

#date{
    font-size:18px;
    color:#bbb;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:10px;
    padding:10px;
    height:calc(100vh - 90px);
    box-sizing:border-box;
}

.tile{
    background:#222;
    border-radius:20px;
    padding:20px;
    box-sizing:border-box;
    cursor:pointer;
}

.tile-title{
    font-size:26px;
    font-weight:bold;
    margin-bottom:15px;
}

.tile-content{
    font-size:20px;
    line-height:1.6;
    color:#ddd;
}

#fullscreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#111;
    display:none;
    z-index:999;
}

#backBtn{
    margin:15px;
    padding:10px 20px;
    font-size:18px;
    border:none;
    border-radius:10px;
}

#fullContent{
    padding:20px;
    font-size:28px;
}

</style>
</head>

<body>

<div id="header">
    <div id="date"></div>
    <div id="clock"></div>
</div>

<div class="grid">

    <div class="tile" onclick="openTile('weather')">
        <div class="tile-title">🌦 Weather</div>
        <div class="tile-content">
            Auckland<br>
            Coming Soon
        </div>
    </div>

    <div class="tile" onclick="openTile('traffic')">
        <div class="tile-title">🚗 Traffic to OGGB</div>
        <div class="tile-content">
            Half Moon Bay → OGGB<br>
            Tap for route
        </div>
    </div>

    <div class="tile" onclick="openTile('calendar')">
        <div class="tile-title">📅 Family Calendar</div>
        <div class="tile-content">
            Coming Soon
        </div>
    </div>

    <div class="tile" onclick="openTile('todo')">
        <div class="tile-title">✅ To Do</div>
        <div class="tile-content" id="todoTile">
            Loading...
        </div>
    </div>

</div>

<div id="fullscreen">

    <button id="backBtn" onclick="closeTile()">⬅ Back</button>

    <div id="fullContent"></div>

</div>

<script>

function updateClock(){

    const now=new Date();

    document.getElementById("clock").innerHTML=
        now.toLocaleTimeString('en-NZ',{
            hour:'2-digit',
            minute:'2-digit'
        });

    document.getElementById("date").innerHTML=
        now.toLocaleDateString('en-NZ',{
            weekday:'long',
            day:'numeric',
            month:'long'
        });
}

setInterval(updateClock,1000);
updateClock();

function openTile(type){

    let html="";

    switch(type){

        case "weather":
            html=`
            <h1>Weather</h1>
            <p>Live Auckland weather coming next.</p>
            `;
            break;

        case "traffic":
            window.open(
            "https://www.google.com/maps/dir/Half+Moon+Bay+Auckland/OGGB+Auckland",
            "_blank");
            return;

        case "calendar":
            html=`
            <h1>Family Calendar</h1>
            <p>Calendar integration coming next.</p>
            `;
            break;

        case "todo":
            html=`
            <h1>Family To Do</h1>
            <div id="todoFullScreen">Loading...</div>
            `;
            break;
    }

    document.getElementById("fullContent").innerHTML=html;
    document.getElementById("fullscreen").style.display="block";

    if(type==="todo"){
        loadTodoFullscreen();
    }
}

function closeTile(){
    document.getElementById("fullscreen").style.display="none";
}

async function loadTodo(){

    const csvUrl =
    const csvUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX28gXFAl_D2C326JF5X_tdLcdj6mQkv515uQID4WU01lyAZBMne2oMjpShwliQ7JAEyMkDZhBUlli/pub?gid=0&single=true&output=csv";

    try{

        const response = await fetch(csvUrl);
        const text = await response.text();

        const rows = text.trim().split('\n');

        let html = "";

        for(let i=1;i<rows.length;i++){

            const cols = rows[i].split(',');

            const done = cols[0].trim();
            const task = cols[1] ? cols[1].trim() : "";

            if(task !== "" && done === ""){
                html += "• " + task + "<br>";
            }
        }

        if(html === ""){
            html = "🎉 No tasks remaining";
        }

        document.getElementById("todoTile").innerHTML = html;

    }catch(err){

        document.getElementById("todoTile").innerHTML =
        "Unable to load tasks";
    }
}

async function loadTodoFullscreen(){

    const csvUrl =
    const csvUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX28gXFAl_D2C326JF5X_tdLcdj6mQkv515uQID4WU01lyAZBMne2oMjpShwliQ7JAEyMkDZhBUlli/pub?gid=0&single=true&output=csv";

    try{

        const response = await fetch(csvUrl);
        const text = await response.text();

        const rows = text.trim().split('\n');

        let html = "";

        for(let i=1;i<rows.length;i++){

            const cols = rows[i].split(',');

            const done = cols[0].trim();
            const task = cols[1] ? cols[1].trim() : "";

            if(task !== "" && done === ""){
                html += "• " + task + "<br><br>";
            }
        }

        if(html === ""){
            html = "🎉 No tasks remaining";
        }

        document.getElementById("todoFullScreen").innerHTML = html;

    }catch(err){

        document.getElementById("todoFullScreen").innerHTML =
        "Unable to load tasks";
    }
}

loadTodo();

setInterval(loadTodo,300000);

</script>

</body>
</html>
