<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Family Dashboard</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

#header{
    height:70px;
    background:#1b1b1b;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    box-sizing:border-box;
    border-bottom:1px solid #333;
}

#clock{
    font-size:32px;
    font-weight:bold;
}

#date{
    font-size:18px;
    color:#bbb;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:10px;
    padding:10px;
    height:calc(100vh - 90px);
    box-sizing:border-box;
}

.tile{
    background:#222;
    border-radius:20px;
    padding:20px;
    box-sizing:border-box;
    cursor:pointer;
    transition:0.2s;
}

.tile:hover{
    background:#2d2d2d;
}

.tile-title{
    font-size:26px;
    font-weight:bold;
    margin-bottom:15px;
}

.tile-content{
    font-size:20px;
    line-height:1.6;
    color:#ddd;
}

#fullscreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#111;
    display:none;
    z-index:999;
}

#backBtn{
    margin:15px;
    padding:10px 20px;
    font-size:18px;
    border:none;
    border-radius:10px;
}

#fullContent{
    padding:20px;
    font-size:28px;
}

</style>
</head>

<body>

<div id="header">
    <div id="date"></div>
    <div id="clock"></div>
</div>

<div class="grid">

    <div class="tile" onclick="openTile('weather')">
        <div class="tile-title">🌦 Weather</div>
        <div class="tile-content">
            Auckland<br>
            14°C<br>
            Light Rain
        </div>
    </div>

    <div class="tile" onclick="openTile('traffic')">
        <div class="tile-title">🚗 Traffic to OGGB</div>
        <div class="tile-content">
            Half Moon Bay → OGGB<br>
            Current: 35 min<br>
            Normal: 22 min
        </div>
    </div>

    <div class="tile" onclick="openTile('calendar')">
        <div class="tile-title">📅 Family Calendar</div>
        <div class="tile-content">
            Today<br>
            10:00 Dentist<br>
            15:00 Football
        </div>
    </div>

    <div class="tile" onclick="openTile('todo')">
        <div class="tile-title">✅ To Do</div>
        <div class="tile-content">
            Buy Milk<br>
            Pay Power Bill<br>
            Pick Up Parcel
        </div>
    </div>

</div>

<div id="fullscreen">

    <button id="backBtn" onclick="closeTile()">⬅ Back</button>

    <div id="fullContent"></div>

</div>

<script>

function updateClock(){

    const now=new Date();

    document.getElementById("clock").innerHTML=
        now.toLocaleTimeString('en-NZ',{
            hour:'2-digit',
            minute:'2-digit'
        });

    document.getElementById("date").innerHTML=
        now.toLocaleDateString('en-NZ',{
            weekday:'long',
            day:'numeric',
            month:'long'
        });
}

setInterval(updateClock,1000);
updateClock();

function openTile(type){

    let html="";

    switch(type){

        case "weather":
            html=`
            <h1>Weather</h1>
            <p>Auckland Weather Details</p>
            <p>Future API data goes here.</p>
            `;
            break;

        case "traffic":
            html=`
            <h1>Traffic to OGGB</h1>
            <p>Current Travel Time: 35 min</p>
            <p>Traffic Map will go here later.</p>
            `;
            break;

        case "calendar":
            html=`
            <h1>Family Calendar</h1>
            <p>Google Calendar integration later.</p>
            `;
            break;

        case "todo":
            html=`
            <h1>To Do List</h1>
            <p>Shared family tasks.</p>
            `;
            break;
    }

    document.getElementById("fullContent").innerHTML=html;
    document.getElementById("fullscreen").style.display="block";
}

function closeTile(){
    document.getElementById("fullscreen").style.display="none";
}

</script>

</body>
</html>
